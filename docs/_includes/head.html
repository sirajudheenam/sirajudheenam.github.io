<head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  
    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
    
    <!-- <link rel="shortcut icon" href="{{ "/img/favicon.ico" }}"/> -->

    <link rel="icon" href="{{ site.baseurl }}/favicon.png" type="image/png" />

    <link rel="stylesheet" href="{{ "/css/main.css" | prepend: site.baseurl }}">
    <link
      rel="canonical"
      href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Open+Sans:400,300,700,800,600"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Muli:400,300"
      rel="stylesheet"
      type="text/css"
    />
    
    {% if site.google_analytics %}{% include google_analytics.html %}{% endif %} 
    {% if site.google_adsense %}{% include google_adsense.html %}{% endif %}
</head>
